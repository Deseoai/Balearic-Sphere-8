version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: mallorca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mallorca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mallorca_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mallorca_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:7
    container_name: mallorca-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
